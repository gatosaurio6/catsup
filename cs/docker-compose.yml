version: '3.8'

services:
  frontend:
    image: n
    restart: always

  gallery:
    image: n 
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False
    restart: always
  
  login:
    image: niquinpro1/catsup-login:lastest
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  ranking:
    image: niquinpro1/catsup-ranking:lastest
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  # 1. ¡NUEVO SERVICIO!: Añadimos comentarios para que se levante junto al resto
  comentarios:
    image: niquinpro1/catsup-comentarios:lastest  # (Ignorando la imagen real por ahora, como pediste)
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    # 2. ¡IMPORTANTE!: Agregamos 'comentarios' aquí para que Nginx no intente
    # arrancar antes de que el microservicio esté listo.
    depends_on:
      - frontend
      - gallery
      - login
      - ranking
      - comentarios