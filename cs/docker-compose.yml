version: '3.8'

services:
  frontend:
    image: nginx:alpine
    volumes:
      - ./feed:/usr/share/nginx/html
    restart: always

  multimedia:
    build:
      context: ./multimedia
      dockerfile: multimedia.dockerfile
    environment:
      - AZURE_ACCOUNT_NAME=tu_nombre_cuenta_aqui
      - AZURE_ACCOUNT_KEY=ESTO_ES_LO_QUE_VA_A_SER_EVALUADO
      - AZURE_CONTAINER=nombre_contenedor
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False
    restart: always
  
  login:
    build:
      context: ./login
      dockerfile: login.dockerfile
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  ranking:
    build:
      context: ./ranking
      dockerfile: ranking.dockerfile
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  comentarios:
    build:
      context: ./comentarios
      dockerfile: comentarios.dockerfile
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - SECRET_KEY=clave_secreta_de_produccion
      - DEBUG=True
      - USE_S3=False

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - multimedia
      - login
      - ranking
      - comentarios