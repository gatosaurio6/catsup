<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatSup - Feed</title>

    <link rel="icon" href="favicon.png" type="image/png">
    
    <link rel="stylesheet" href="feed.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"> • ω • CatSup.com</div>
        <div class="nav-links">
            <button class="nav-btn" onclick="window.location.href='ranking.html'">Ranking</button>
            <button class="nav-btn active" id="btn-abrir-login">Ingresar / Registro</button>
        </div>
    </nav>

    <main class="feed-wrapper">
        <p class="feed-subtitle">♡ EL RINCÓN FELINO DE INTERNET ♡</p>

        <div class="create-post-card">
            <h3>¡Comparte tu gatito! :3</h3>
            <div class="input-group">
                <textarea id="caption-input" placeholder="¿Qué está haciendo tu gatito hoy?"></textarea>
            </div>
            <div class="form-actions">
                <label for="image-input" class="file-label">Seleccionar foto</label>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <span id="file-name" class="file-name">Ninguna foto seleccionada</span>

                <button id="submit-post-btn" class="submit-post-btn">Publicar :3</button>
            </div>
        </div>

        <div id="contenedor-posts"></div>
    </main>

    <div id="modal-login" class="modal-oculto">
        <div class="modal-contenido">
            <span class="cerrar-modal" id="btn-cerrar-login">&times;</span>
            <h3 style="color: #ff6b81; margin-bottom: 15px;">¡Bienvenido a CatSup!</h3>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="email-input" placeholder="Usuario" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="password" id="password-input" placeholder="Contraseña" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <button id="login-btn" style="padding: 10px; border-radius: 5px; background-color: #ffb6c1; border: none; cursor: pointer; font-weight: bold;">Iniciar Sesión</button>
            </div>
            
            <p style="margin-top: 15px; font-size: 0.9em;">¿No tienes cuenta? <a href="#" style="color: #ff6b81;">Regístrate aquí</a></p>
        </div>
    </div>
    
    <script src="feed.js"></script>
</body>
</html>
