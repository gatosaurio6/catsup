---
- name: Despliegue profesional de Catsup en AWS
  hosts: app_servers
  become: True
  tasks:
    - name: 1. Actualizar caché de apt
      apt:
        update_cache: True
        force_apt_get: True

    - name: 2. Instalar dependencias de Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: 3. Agregar clave oficial de Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: 4. Agregar repositorio oficial de Docker
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: 5. Instalar Docker y plugin de compose
      apt:
        name:
          - docker-ce
          - docker-compose-plugin
        state: present

    - name: 6. Asegurar que Docker esté activo
      service:
        name: docker
        state: started
        enabled: True

    - name: 7. Crear directorio de proyecto
      file:
        path: /opt/catsup
        state: directory
        mode: '0755'

    - name: 8. Copiar docker-compose desde la raíz del proyecto
      template:
        src: ../docker-compose.yml.j2 
        dest: /opt/catsup/docker-compose.yml
        mode: '0644'

    - name: 9. Bajar imágenes y levantar servicios
      command: docker compose pull && docker compose up -d
      args:
        chdir: /opt/catsup

    - name: 10. Migraciones Login
      command: docker exec catsup-login-1 python manage.py migrate
      run_once: True
      ignore_errors: True

    - name: 11. Migraciones Ranking
      command: docker exec catsup-ranking-1 python manage.py migrate
      run_once: True
      ignore_errors: True