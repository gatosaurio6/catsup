---
- name: Instalar Docker y desplegar Microservicios en AWS
  hosts: app_servers
  become: true
  tasks:
    - name: 1. Actualizar el sistema (apt-get update)
      apt:
        update_cache: true
        force_apt_get: true

    - name: 2. Instalar herramientas requeridas del sistema
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: 3. Agregar la clave oficial de GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: 4. Agregar el repositorio de Docker (Autodetectando la versión de Ubuntu)
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: 5. Instalar Docker y Docker Compose V2
      apt:
        name: 
          - docker-ce
          - docker-compose-plugin
        state: present

    - name: 6. Asegurar que Docker esté encendido y activo
      service:
        name: docker
        state: started
        enabled: true

    - name: 7. Crear la carpeta del proyecto en el servidor
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: 8. Copiar el archivo default.conf de Nginx
      copy:
        src: ../nginx/default.conf
        dest: /home/ubuntu/app/default.conf
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: 9. Copiar el docker-compose de AWS a la carpeta de la app
      template:
        src: ../docker-compose-aws.yml
        # Lo guardamos directamente como docker-compose.yml dentro de /app
        dest: /home/ubuntu/app/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    # ¡ESTE PASO ES NUEVO Y CLAVE!
    - name: 10. Crear el archivo .env con los datos de base de datos de Terraform
      copy:
        dest: /home/ubuntu/app/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          DB_HOST={{ db_host }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          DB_ENGINE=django.db.backends.postgresql
          SECRET_KEY=clave_secreta_de_produccion
          DEBUG=True
          USE_S3=False

    - name: 11. Descargar imágenes y levantar los contenedores
      command: docker compose up -d
      args:
        chdir: /home/ubuntu/app

    # Usamos "docker compose exec -T" apuntando al nombre del servicio en el compose. 
    # El "-T" deshabilita la asignación de pseudo-TTY (necesario para scripts automatizados)
    - name: 12. Ejecutar las migraciones del módulo gallery
      command: docker compose exec -T gallery python manage.py migrate
      args:
        chdir: /home/ubuntu/app
      run_once: true

    - name: 13. Ejecutar las migraciones del módulo login
      command: docker compose exec -T login python manage.py migrate
      args:
        chdir: /home/ubuntu/app
      run_once: true

    - name: 14. Ejecutar las migraciones en el módulo ranking
      command: docker compose exec -T ranking python manage.py migrate
      args:
        chdir: /home/ubuntu/app
      run_once: true

    # ¡Añadido también para el nuevo servicio!
    - name: 15. Ejecutar las migraciones en el módulo comentarios
      command: docker compose exec -T comentarios python manage.py migrate
      args:
        chdir: /home/ubuntu/app
      run_once: true