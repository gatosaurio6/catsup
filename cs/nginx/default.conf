map $http_origin $cors_origin {
    default "https://catsup.servemp3.com";
}

server {
    listen 80;
    server_name catsup.servemp3.com;

    # Headers globales
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CORS Global
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;

    # Servicios en AWS (internos de Docker)
    location /api/auth/ {
        proxy_pass http://login:8000/; 
    }

    location /api/ranking/ {
        proxy_pass http://ranking:8002/;
    }

    # Servicios en Azure (Externos)
    # Reemplaza <IP_AZURE> por la IP pública o el DNS de tu instancia en Azure
    location /api/multimedia/ {
        proxy_pass http://<IP_AZURE>:8000/;
    }

    location /api/comentarios/ {
        proxy_pass http://<IP_AZURE>:8003/;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:80/;
    }
}