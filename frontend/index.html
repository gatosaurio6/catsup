<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kittys.com Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cat-login-wrapper">
        
        <div class="cat-feature ear ear-left">^</div>
        <div class="cat-feature ear ear-right">^</div>
        <div class="cat-feature cheek cheek-left">(</div>
        <div class="cat-feature cheek cheek-right">)</div>
        <div class="cat-feature tail">S</div>

        <div class="form-container">
            <h1 class="brand-title">Kittys.com</h1>
            <p class="subtitle">Selecciona una opción</p>
            
            <div class="input-group">
                <input type="email" value="get@ziontutorial.com" class="input-focused" readonly>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>
        </div>

    </div>

</body>
</html>
