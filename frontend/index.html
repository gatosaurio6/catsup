<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kittys.com Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cat-login-wrapper">
        
        <div class="cat-feature ear ear-left">^</div>
        <div class="cat-feature ear ear-right">^</div>
        <div class="cat-feature cheek cheek-left">(</div>
        <div class="cat-feature cheek cheek-right">)</div>
        <div class="cat-feature tail">S</div>

    <div class="form-container">
        <h1 class="brand-title">Kittys.com</h1>
        <p class="subtitle">Login</p>
    
        <div class="input-group">
            <input type="text" id="email-input" placeholder="Usuario" class="input-focused">
        </div>
    
        <div class="input-group">
            <input type="password" id="password-input" placeholder="Password">
        </div>

        <div class="input-group">
            <button id="login-btn" style="width: 300px; padding: 14px 16px; background-color: #1a1a1a; color: white; border: none; border-radius: 6px; cursor: pointer;">Entrar</button>
        </div>
    </div>

    </div>
 
</body>
</html>
