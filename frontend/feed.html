<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatSup - Feed</title>

    <link rel="icon" href="favicon.png" type="image/png">
    
    <link rel="stylesheet" href="feed.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"> • ω • CatSup.com</div>
        <div class="nav-links">
            <button class="nav-btn active">Recientes ⋆</button>
            <button class="nav-btn" onclick="window.location.href='ranking.html'">Ranking ⋆</button>
        </div>
    </nav>

    <main class="feed-wrapper">
        <p class="feed-subtitle">♡ EL RINCÓN FELINO DE INTERNET ♡</p>

        <div class="create-post-card">
            <h3>¡Comparte tu gatito! :3</h3>
            <div class="input-group">
                <textarea id="caption-input" placeholder="¿Qué está haciendo tu gatito hoy?"></textarea>
            </div>
            <div class="form-actions">
                <label for="image-input" class="file-label">Seleccionar foto</label>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <span id="file-name" class="file-name">Ninguna foto seleccionada</span>

                <button id="submit-post-btn" class="submit-post-btn">Publicar :3</button>
            </div>
        </div>

        <div id="contenedor-posts"></div>
    </main>
    
    <script src="feed.js"></script>
</body>
</html>
