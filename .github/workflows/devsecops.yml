name: DevSecOps Pipeline - Catsup CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # FASE 1: SEGURIDAD EN EL CÓDIGO (SAST & SCA)
  # ==========================================
  security-code-scan:
    name: 1. Análisis Estático y Dependencias (SAST & SCA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Control de Seguridad: Análisis de vulnerabilidades en dependencias (SCA)
      - name: Escaneo de vulnerabilidades en dependencias (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results-sca.sarif'
          severity: 'CRITICAL,HIGH'

      # Control de Seguridad: Análisis de código estático (SAST)
      - name: Escaneo de código estático (SAST) con Bandit
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true

      - name: Subir resultados de seguridad a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-sca.sarif'

  # ==========================================
  # FASE 2: CONSTRUCCIÓN Y ESCANEO DE LOS 4 MÓDULOS
  # ==========================================
  build-and-container-scan:
    name: 2. Build y Escaneo de Contenedores
    needs: security-code-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Autenticación en el Registro de Contenedores
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- MÓDULO 1: COMENTARIOS ---
      - name: Construir y escanear - Comentarios
        uses: docker/build-push-action@v5
        with:
          context: ./comentarios
          file: ./comentarios/comentarios.dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-comentarios:staging

      - name: Trivy Scan - Comentarios
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-comentarios:staging'
          severity: 'CRITICAL,HIGH'

      # --- MÓDULO 2: LOGIN ---
      - name: Construir y escanear - Login
        uses: docker/build-push-action@v5
        with:
          context: ./login
          file: ./login/login.dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-login:staging

      - name: Trivy Scan - Login
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-login:staging'
          severity: 'CRITICAL,HIGH'

      # --- MÓDULO 3: MULTIMEDIA ---
      - name: Construir y escanear - Multimedia
        uses: docker/build-push-action@v5
        with:
          context: ./multimedia
          file: ./multimedia/multimedia.dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-multimedia:staging

      - name: Trivy Scan - Multimedia
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-multimedia:staging'
          severity: 'CRITICAL,HIGH'

      # --- MÓDULO 4: RANKING ---
      - name: Construir y escanear - Ranking
        uses: docker/build-push-action@v5
        with:
          context: ./ranking
          file: ./ranking/ranking.dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ranking:staging

      - name: Trivy Scan - Ranking
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ranking:staging'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # FASE 3: DESPLIEGUE CONTINUO SEGURO (CD)
  # ==========================================
  deploy:
    name: 3. Despliegue Automatizado con Ansible
    needs: build-and-container-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias de Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configurar llave privada SSH de AWS de forma segura
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ejecutar Playbook de Despliegue en AWS
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i infrastructure/ansible/inventory.ini infrastructure/ansible/playbook.yml