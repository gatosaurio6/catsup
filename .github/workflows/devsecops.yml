name: DevSecOps Pipeline - Catsup CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan:
    name: Ejecución de Escaneos de Seguridad
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      # 1. SECRET SCANNING (Lo que ya tenías)
      - name: Ejecutar Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. SCA (Software Composition Analysis)
      - name: Instalar Safety
        run: pip install safety
      - name: Ejecutar Safety (SCA - Escaneo de librerías)
        # Esto buscará vulnerabilidades en tus archivos requirements.txt
        run: safety check -r requirements.txt || true 

      # 3. SAST (Static Application Security Testing)
      - name: Instalar Bandit
        run: pip install bandit
      - name: Ejecutar Bandit (SAST - Escaneo de código)
        # Analiza todo tu código en busca de malas prácticas
        run: bandit -r . -f txt || true

      # 4. IaC SCANNING (Infrastructure as Code)
      - name: Ejecutar Trivy (IaC Scanning - Docker y Compose)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '0' # Cambia a '1' si quieres que el pipeline falle ante errores
